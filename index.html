<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Our Wedding Celebration</title>
    
    <style>
        /* Modern CSS Variables & Reset */
        :root {
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            --bg-color: #fcfbfa;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #8a7a6e;
            --accent-light: #e2dcd5;
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            --radius: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Native CSS Nesting (Modern Standard Layout) */
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: max(2rem, 4vw);

            header {
                text-align: center;
                margin-bottom: clamp(3rem, 8vw, 6rem);

                h1 {
                    font-size: clamp(2.5rem, 6vw, 4.5rem);
                    font-weight: 200;
                    letter-spacing: 4px;
                    color: var(--accent);
                    margin-bottom: 1.5rem;
                    text-transform: uppercase;
                }

                .meta-info {
                    font-size: clamp(1.1rem, 2vw, 1.3rem);
                    color: var(--text-muted);
                    font-weight: 300;
                    letter-spacing: 1px;
                    
                    b {
                        color: var(--text-main);
                        font-weight: 500;
                    }
                }
            }
        }

        /* Fluid Responsive Photo Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: clamp(3rem, 8vw, 6rem);
        }

        .gallery-grid .photo-frame {
            overflow: hidden;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            aspect-ratio: 4 / 5;
            background: linear-gradient(135deg, rgba(138, 122, 110, 0.08), rgba(138, 122, 110, 0.02));
        }

        .gallery-grid .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(1.03);
            transition: opacity 0.6s ease, transform 0.6s ease;
            will-change: opacity, transform;
        }

        .gallery-grid .photo-frame img.is-visible {
            opacity: 1;
            transform: scale(1);
        }

        .gallery-grid .photo-frame img.is-hidden {
            opacity: 0;
            transform: scale(1.03);
        }

        .gallery-grid .photo-frame img:hover {
            transform: scale(1.04);
        }

        /* Clean RSVP / Guest Messages Wrapper Layout */
        .rsvp-container {
            background: #ffffff;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 1rem;
            border: 1px solid rgba(0,0,0,0.02);
            position: relative;
            text-align: center;
            padding: 28px;
            margin-bottom: clamp(2rem, 6vw, 3rem);
            
            iframe {
                width: 100%;
                border: none;
                border-radius: calc(var(--radius) - 4px);
                display: block;
            }

            h2 {
                margin-bottom: 8px;
                font-size: 1.6rem;
                color: var(--accent);
                font-weight: 300;
            }

            p.lead {
                margin-bottom: 16px;
                color: var(--text-muted);
            }
        }

        /* Guest messages UI */
        .guest-form {
            /* Make the textarea occupy the full section width and place the button below it */
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            align-items: start;
            margin-top: 12px;
        }

        textarea#gmsg {
            width: 100%;
            /* Increase the visible area but keep it bounded by viewport to avoid overflowing the section */
            min-height: 220px;
            max-height: min(60vh, 420px);
            resize: vertical;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--accent-light);
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
        }

        button#send {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            justify-self: start; /* keep the button aligned to the left of the form */
        }

        .messages {
            margin-top: 20px;
            text-align: left;
            display: grid;
            gap: 12px;
        }

        .message {
            background: linear-gradient(180deg, #fff 0%, #fbfaf9 100%);
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
            font-size: 0.98rem;
            color: var(--text-main);
            position: relative;
        }

        .message time {
            display: block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Delete button for admin */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: 1px solid rgba(0,0,0,0.06);
            color: var(--accent);
            padding: 6px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .delete-btn:hover {
            background: rgba(138,122,110,0.06);
        }

        /* Native Dialog Password Gate with Glassmorphism Backdrop */
        dialog#gateway {
            border: none;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: rgba(252, 251, 250, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;

            .gate-card {
                background: #ffffff;
                padding: 3rem 2.5rem;
                border-radius: var(--radius);
                box-shadow: 0 30px 60px rgba(0,0,0,0.1);
                text-align: center;
                max-width: 420px;
                width: 90%;

                h2 {
                    font-weight: 300;
                    letter-spacing: 2px;
                    margin-bottom: 1rem;
                    color: var(--accent);
                }

                p {
                    font-size: 0.95rem;
                    color: var(--text-muted);
                    margin-bottom: 2rem;
                }

                input[type="password"] {
                    width: 100%;
                    padding: 14px;
                    border: 1px solid var(--accent-light);
                    border-radius: 8px;
                    font-size: 1rem;
                    text-align: center;
                    outline: none;
                    transition: border-color 0.3s;
                    margin-bottom: 1rem;

                    &:focus {
                        border-color: var(--accent);
                    }
                }

                button {
                    width: 100%;
                    padding: 14px;
                    background: var(--accent);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    font-size: 1rem;
                    font-weight: 500;
                    cursor: pointer;
                    letter-spacing: 1px;
                    transition: opacity 0.3s;

                    &:hover {
                        opacity: 0.9;
                    }
                }

                .error-txt {
                    color: #e53e3e;
                    font-size: 0.85rem;
                    margin-top: 1rem;
                    min-height: 20px;
                }
            }
        }

        /* Prevent background layout interactions when gate is locked */
        body:has(dialog[open]) .wrapper {
            pointer-events: none;
            filter: blur(4px);
        }
    </style>
</head>
<body>
    <main class="wrapper">
        <header>
            <h1>Amy & Eugene</h1>
            <p class="meta-info">
                <b>Saturday, October 10, 2026</b><br>
                Ceremony begins at 1:00 PM &bull; Reception to follow<br>
                <a href="https://maps.app.goo.gl/SLkeT8nFsdHoeuRE8" target="_blank" rel="noopener noreferrer">Hong Kong Disneyland Hotel</a>
            </p>
        </header>

        <section class="gallery-grid">
            <div class="photo-frame">
                <img alt="Wedding photo 1" loading="lazy">
            </div>
            <div class="photo-frame">
                <img alt="Wedding photo 2" loading="lazy">
            </div>
            <div class="photo-frame">
                <img alt="Wedding photo 3" loading="lazy">
            </div>
            <div class="photo-frame">
                <img alt="Wedding photo 4" loading="lazy">
            </div>
        </section>

        <script>
        (function () {
          const imgEls = Array.from(document.querySelectorAll('.gallery-grid .photo-frame img'));
          const BATCH_SIZE = 4;
          const INTERVAL_MS = 3000; // 3 seconds

          const photoPaths = [
            'https://lh3.googleusercontent.com/d/1fRfJOqz00S9UXJFjysG7BzYicakt2-mB',
            'https://lh3.googleusercontent.com/d/1V6YDhE-HmfKZjCBLTXnSdskkhr2FhemW',
            'https://lh3.googleusercontent.com/d/1ijPZYg9RaKOQyqmPCdZvX_QmFglClXXU',
            'https://lh3.googleusercontent.com/d/1vXHy16taTTqy8s2U9b0pC5coRM47bc4m',
            'https://lh3.googleusercontent.com/d/1ZVhaIgn5IANosXrBt4auNTHNgvTcdgGq',
            'https://lh3.googleusercontent.com/d/1OwyrDVUeFrz65ZTfERUHFa78aobohTs1',
            'https://lh3.googleusercontent.com/d/1SUQWemSCg5b1va5rkMIyG8B_rrA28HnU',
            'https://lh3.googleusercontent.com/d/1b-sV4kuJB4JZUibrjtQnuqepHZs2dpBg',
            'https://lh3.googleusercontent.com/d/1h1-fPA-7QiCNnVKb_ZskBtbdjRwvzChC',
            'https://lh3.googleusercontent.com/d/1zsgTAAmxInG0TXBT8--84joLa2NqNeF8',
            'https://lh3.googleusercontent.com/d/18yzpEyFygcAHeaINPCX66cO-SSkc7DCw',
            'https://lh3.googleusercontent.com/d/1ILZvE2wuLLln0Cc2zBeZkbgd5QImbAjz',
            'https://lh3.googleusercontent.com/d/1KTXdo-NuxyC1RedKTUNePm3_LL8lI0z2',
            'https://lh3.googleusercontent.com/d/1vKW74T6FkWXGYMLJLlzNftcQJ_CsOx06',
            'https://lh3.googleusercontent.com/d/1Pth0hzCEqKHnsplYskPoNdDahx1gsr9o',
            'https://lh3.googleusercontent.com/d/1q7M1fw3H-zIi8liZa80uHh6I3nS6Q2l7',
            'https://lh3.googleusercontent.com/d/11OmJXahYjZX3amFWhvWDjNaKuraYxSto',
            'https://lh3.googleusercontent.com/d/114dB1d19DAQpjAHYP-2Imy2wICF-ATUR',
            'https://lh3.googleusercontent.com/d/1RSVwxOldK5yJUnE8TBl6FjAUsCunYG8J',
            'https://lh3.googleusercontent.com/d/1VuM_IA8MTmdzar1GPbxWPqgYVRwMDb-X',
            'https://lh3.googleusercontent.com/d/1hTDPDl-oSZEncz6jHC2EVjR2vNK5uRRt',
            'https://lh3.googleusercontent.com/d/1FoWx8nIPafQyi94DMo8GhSsI4D7dWh45',
            'https://lh3.googleusercontent.com/d/1UsmhB-G1PNKMj48j8yXnZQfjn0g3oNvw',
            'https://lh3.googleusercontent.com/d/1e49bIZwNBmsJBrVrV7D8sexdWVO7bGe1',
            'https://lh3.googleusercontent.com/d/1RD5-TAIVy8s0qHFd9NKvIBQkNRTJfd5Y',
            'https://lh3.googleusercontent.com/d/1JpN9Y1-aiE99PtFyE3e1ONv8xjepqMS5',
            'https://lh3.googleusercontent.com/d/1iOek7Lv3DKuKOpNOTk4P6HR8XTi1v2SA',
            'https://lh3.googleusercontent.com/d/1AS1obOi2VtXoEZRS86J9d6nA5i8o528m',
            'https://lh3.googleusercontent.com/d/1dxWYuuotYPfJbdMI9EplDLGnPEllWkGP',
            'https://lh3.googleusercontent.com/d/1LGd7vBr_L06y5x3OBwWQ5z8OXeSbTjBS',
            'https://lh3.googleusercontent.com/d/1vKDA4cp0bjUI_2OpX18GgPk00sFfjWRn',
            'https://lh3.googleusercontent.com/d/1ev58PPk1ETWihumV4HZi726USoaOiFgE',
            'https://lh3.googleusercontent.com/d/1gCFyoNgkYiyQxgoHIRS-6CAjwQS0jKMX',
            'https://lh3.googleusercontent.com/d/1Qtrz4Qv46zMHufRQk4AVUoPQpaF5NUh7',
            'https://lh3.googleusercontent.com/d/1-E8f0UVWgaU2mvvzEDN9ujvST1exg9Is',
            'https://lh3.googleusercontent.com/d/1OGj7BbrqLyHzon7IKagNNTd0PVzZ1ZKf',
            'https://lh3.googleusercontent.com/d/1D95eaoj3LbhL4V19JTWB5k_uf2DEjECr',
            'https://lh3.googleusercontent.com/d/1bYEd5LTsUvyi_iwEe6trJS7uECgMANtp',
            'https://lh3.googleusercontent.com/d/1RWp868na3D3nBbFsorEQraLn_6ZuGQOx',
            'https://lh3.googleusercontent.com/d/1TC2FogZK-MF9xKDefAYu6swjCNe0xm9B'
          ];

          let batchIndex = 0;
          const totalBatches = Math.ceil(photoPaths.length / BATCH_SIZE);
          let timer = null;

          function clearSlot(img) {
            img.classList.remove('is-visible');
            img.classList.add('is-hidden');
            img.style.opacity = '0';
            img.style.transform = 'scale(1.03)';
            img.removeAttribute('src');
            img.alt = '';
          }

          function revealImage(img, src, alt) {
            img.classList.remove('is-hidden');
            img.classList.remove('is-visible');
            img.style.opacity = '0';
            img.style.transform = 'scale(1.03)';

            function showImage() {
              img.classList.add('is-visible');
              img.style.opacity = '1';
              img.style.transform = 'scale(1)';
            }

            function showError() {
              img.classList.remove('is-visible');
              img.classList.add('is-hidden');
              img.style.opacity = '0';
              img.style.transform = 'scale(1.03)';
              img.alt = 'Image unavailable';
            }

            img.onload = null;
            img.onerror = null;
            img.src = src;
            img.alt = alt;
            img.loading = 'lazy';

            if (img.complete && img.naturalWidth > 0) {
              showImage();
            } else {
              img.onload = function () {
                window.setTimeout(showImage, 120);
              };
              img.onerror = function () {
                showError();
              };
            }
          }

          function renderBatch() {
            const start = batchIndex * BATCH_SIZE;
            for (let i = 0; i < BATCH_SIZE; i++) {
              const pos = start + i;
              const img = imgEls[i];
              if (!img) continue;

              clearSlot(img);

              if (pos < photoPaths.length) {
                const src = photoPaths[pos];
                const alt = 'Wedding photo ' + (pos + 1);
                revealImage(img, src, alt);
              }
            }

            batchIndex = (batchIndex + 1) % totalBatches;
          }

          renderBatch();
          timer = window.setInterval(renderBatch, INTERVAL_MS);
        })();
        </script>

        <section id="guest-messages" class="rsvp-container">
            <h2>Leave your congratulations</h2>
            <p class="lead">Share a short message for the newlyweds — your kind words will be treasured.</p>

            <!-- Replaced Google Form embed with a lightweight, local guest message textarea. -->
            <form id="guestForm" class="guest-form" action="#" method="post" novalidate>
                <textarea id="gmsg" name="message" placeholder="Write your message here..." maxlength="1000" required aria-label="Message for newlyweds"></textarea>
                <div>
                    <button id="send" type="submit">Send</button>
                </div>
            </form>

            <div class="messages" id="messages" aria-live="polite" aria-atomic="true"></div>
            <!-- Debug/status area for Firebase connection -->
            <div id="firebase-debug" style="margin-top:12px;font-size:0.92rem;color:#555"></div>
        </section>
    </main>

    <!-- Firebase SDK (compat) - required only if you enable Firebase below -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        // Lightweight in-memory + localStorage messages with optional Firebase Realtime Database sync.
        // Added verbose debug logs and automatic URL fallbacks to help diagnose realtime sync issues.
        (function () {
            var form = document.getElementById('guestForm');
            var textarea = document.getElementById('gmsg');
            var list = document.getElementById('messages');
            var debugEl = document.getElementById('firebase-debug');
            var STORAGE_KEY = 'guest_messages_v1';

            function logDebug() {
                var args = Array.prototype.slice.call(arguments);
                try { console.debug.apply(console, args); } catch (e) { console.log.apply(console, args); }
                if (debugEl) {
                    try {
                        debugEl.textContent = args.map(function (a) { return (typeof a === 'object') ? JSON.stringify(a) : String(a); }).join(' | ');
                    } catch (e) {
                        debugEl.textContent = String(args.join(' | '));
                    }
                }
            }

            logDebug('[guest-messages] script loaded', 'window.firebase present=', !!window.firebase);

            // Firebase toggle & config. Provided client Web App config inserted here.
            var ENABLE_FIREBASE = true; // enabled
            var FIREBASE_CONFIG = {
              apiKey: "AIzaSyC0DG1KO2QQpGRckTFDlZLJHP14dOOhGNY",
              authDomain: "amyeugenewedding20261010.firebaseapp.com",
              databaseURL: "https://amyeugenewedding20261010-default-rtdb.asia-southeast1.firebasedatabase.app",
              projectId: "amyeugenewedding20261010",
              storageBucket: "amyeugenewedding20261010.firebasestorage.app",
              messagingSenderId: "1090930693469",
              appId: "1:1090930693469:web:19786a45013faa71bb04b4",
              measurementId: "G-SYWGR84162"
            };

            // Determine admin mode: visible delete buttons only when URL contains ?admin=1 or ?admin=true
            var isAdmin = (function () {
                try {
                    var params = new URLSearchParams(window.location.search);
                    var v = params.get('admin');
                    if (v === '1' || v === 'true') return true;
                    return false;
                } catch (e) {
                    return false;
                }
            })();

            // Firebase initialization (optional)
            var useFirebase = false;
            var firebaseRef = null;

            function tryInitWithDatabaseURL(dbUrl) {
                try {
                    logDebug('[guest-messages] trying firebase init with databaseURL=', dbUrl);
                    // If an app already exists, delete it before reinitializing to avoid duplicate app errors
                    if (window.firebase && firebase.apps && firebase.apps.length) {
                        try {
                            // delete existing apps (best effort)
                            firebase.apps.forEach(function (a) {
                                try { a.delete(); } catch (e) { /* ignore */ }
                            });
                        } catch (e) { /* ignore */ }
                    }
                    FIREBASE_CONFIG.databaseURL = dbUrl;
                    firebase.initializeApp(FIREBASE_CONFIG);
                    var db = firebase.database();
                    firebaseRef = db.ref('/guest_messages_v1');
                    useFirebase = true;
                    logDebug('[guest-messages] initialized Firebase with', dbUrl);
                    return true;
                } catch (e) {
                    logDebug('[guest-messages] firebase init failed for', dbUrl, e && e.message ? e.message : e);
                    try { useFirebase = false; } catch (_) {}
                    return false;
                }
            }

            try {
                logDebug('[guest-messages] attempting Firebase init original databaseURL', FIREBASE_CONFIG && FIREBASE_CONFIG.databaseURL ? FIREBASE_CONFIG.databaseURL : '<no databaseURL>');
                if (ENABLE_FIREBASE && window.firebase && FIREBASE_CONFIG && FIREBASE_CONFIG.databaseURL) {
                    // First try the provided URL
                    if (!tryInitWithDatabaseURL(FIREBASE_CONFIG.databaseURL)) {
                        // If it failed, try common variations automatically (helps when databaseURL differs)
                        var pid = FIREBASE_CONFIG.projectId || '';
                        var candidates = [];
                        if (pid) {
                            candidates.push('https://' + pid + '.firebaseio.com');
                            candidates.push('https://' + pid + '-default-rtdb.firebaseio.com');
                            candidates.push('https://' + pid + '.firebasedatabase.app');
                        }
                        // Add a few safe hard-coded fallbacks
                        candidates.push('https://' + (FIREBASE_CONFIG.databaseURL || '').replace(/^https?:\/\//, ''));

                        for (var i = 0; i < candidates.length; i++) {
                            var c = candidates[i];
                            if (!c) continue;
                            if (tryInitWithDatabaseURL(c)) break;
                        }
                    }
                } else if (!window.firebase) {
                    logDebug('[guest-messages] Firebase SDK is not loaded (window.firebase is falsy)');
                } else if (!FIREBASE_CONFIG || !FIREBASE_CONFIG.databaseURL) {
                    logDebug('[guest-messages] Firebase config missing databaseURL');
                }
            } catch (e) {
                console.error('[guest-messages] Firebase init failed', e);
                logDebug('[guest-messages] Firebase init failed final:', e && e.message ? e.message : e);
                useFirebase = false;
            }

            if (useFirebase) {
                logDebug('[guest-messages] Firebase initialized successfully, using Realtime Database at', FIREBASE_CONFIG.databaseURL);
            }

            // In-memory messages array. If using Firebase we start empty and rely on realtime events.
            var messages = [];

            if (!useFirebase) {
                // Load existing messages from localStorage (fast, synchronous, small payloads)
                try {
                    var raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) messages = JSON.parse(raw);
                    logDebug('[guest-messages] loaded', messages.length, 'messages from localStorage');
                } catch (e) {
                    // If parsing fails, clear storage entry to avoid repeated errors.
                    console.warn('Failed to read guest messages from localStorage', e);
                    try { localStorage.removeItem(STORAGE_KEY); } catch (ignored) {}
                    messages = [];
                    logDebug('[guest-messages] localStorage read failed, cleared.');
                }
            }

            // Helper: create message DOM node and append
            function appendMessage(msg) {
                var wrapper = document.createElement('div');
                wrapper.className = 'message';
                if (msg.key) {
                    wrapper.setAttribute('data-key', msg.key);
                } else {
                    wrapper.setAttribute('data-ts', msg.ts);
                }

                var text = document.createElement('div');
                text.textContent = msg.text;
                wrapper.appendChild(text);

                var time = document.createElement('time');
                time.textContent = new Date(msg.ts).toLocaleString();
                wrapper.appendChild(time);

                // If admin, add delete button
                if (isAdmin) {
                    var del = document.createElement('button');
                    del.className = 'delete-btn';
                    del.textContent = 'Delete';
                    del.setAttribute('aria-label', 'Delete message');
                    del.addEventListener('click', function () {
                        if (!confirm('Delete this message? This action cannot be undone.')) return;
                        deleteMessage(msg);
                    });
                    wrapper.appendChild(del);
                }

                list.appendChild(wrapper);
            }

            // Render initial messages (append only) - used for localStorage fallback
            (function renderInitial() {
                if (useFirebase) {
                    logDebug('[guest-messages] skipping local render; using Firebase realtime');
                    return; // Firebase will populate via realtime events
                }
                if (!messages || !messages.length) {
                    logDebug('[guest-messages] no local messages to render');
                    return;
                }
                var frag = document.createDocumentFragment();
                for (var i = 0; i < messages.length; i++) {
                    var msg = messages[i];
                    var wrapper = document.createElement('div');
                    wrapper.className = 'message';
                    wrapper.setAttribute('data-ts', msg.ts);

                    var text = document.createElement('div');
                    text.textContent = msg.text;
                    wrapper.appendChild(text);

                    var time = document.createElement('time');
                    time.textContent = new Date(msg.ts).toLocaleString();
                    wrapper.appendChild(time);

                    if (isAdmin) {
                        var del = document.createElement('button');
                        del.className = 'delete-btn';
                        del.textContent = 'Delete';
                        del.setAttribute('aria-label', 'Delete message');
                        (function(ts){ del.addEventListener('click', function () {
                            if (!confirm('Delete this message? This action cannot be undone.')) return;
                            deleteMessage({ ts: ts });
                        }); })(msg.ts);
                        wrapper.appendChild(del);
                    }

                    frag.appendChild(wrapper);
                }
                list.appendChild(frag);
                logDebug('[guest-messages] rendered', messages.length, 'local messages');
            })();

            // If using Firebase, wire realtime listeners to populate messages for all visitors
            if (useFirebase && firebaseRef) {
                messages = [];
                logDebug('[guest-messages] attaching Firebase listeners');

                firebaseRef.on('child_added', function (snap) {
                    try {
                        var val = snap.val();
                        logDebug('[guest-messages] child_added key=', snap.key, 'val=', val);
                        if (!val) return;
                        var msg = { text: val.text, ts: val.ts || Date.now(), key: snap.key };
                        messages.push(msg);
                        appendMessage(msg);
                    } catch (e) {
                        console.error('[guest-messages] error in child_added handler', e);
                        logDebug('[guest-messages] child_added handler error:', e && e.message ? e.message : e);
                    }
                }, function (err) {
                    console.error('[guest-messages] Firebase child_added listener failed', err);
                    logDebug('[guest-messages] Firebase child_added listener error:', err && err.message ? err.message : err);
                });

                firebaseRef.on('child_removed', function (snap) {
                    try {
                        var key = snap.key;
                        logDebug('[guest-messages] child_removed key=', key);
                        for (var i = 0; i < messages.length; i++) {
                            if (messages[i].key === key) {
                                messages.splice(i, 1);
                                break;
                            }
                        }
                        var node = list.querySelector('[data-key="' + key + '"]');
                        if (node) node.remove();
                    } catch (e) {
                        console.error('[guest-messages] error in child_removed handler', e);
                        logDebug('[guest-messages] child_removed handler error:', e && e.message ? e.message : e);
                    }
                }, function (err) {
                    console.error('[guest-messages] Firebase child_removed listener failed', err);
                    logDebug('[guest-messages] Firebase child_removed listener error:', err && err.message ? err.message : err);
                });

                // Optional: listen for connectivity state from .info/connected
                try {
                    var conRef = firebase.database().ref('.info/connected');
                    conRef.on('value', function(snap) {
                        var connected = snap.val() === true;
                        logDebug('[guest-messages] .info/connected =', connected);
                    });
                } catch (e) {
                    logDebug('[guest-messages] failed to attach .info/connected listener', e && e.message ? e.message : e);
                }
            }

            // Persist messages to localStorage (debounced to avoid excessive writes)
            var saveTimer = null;
            function persist() {
                if (useFirebase) return; // do not persist when using shared DB
                if (saveTimer) return; // simple throttle: at most once per event loop tick
                saveTimer = setTimeout(function () {
                    saveTimer = null;
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
                        logDebug('[guest-messages] persisted', messages.length, 'messages to localStorage');
                    } catch (e) {
                        console.warn('Failed to persist guest messages', e);
                        logDebug('[guest-messages] persist failed:', e && e.message ? e.message : e);
                    }
                }, 0);
            }

            function deleteMessage(msgOrKey) {
                var key = null;
                var ts = null;
                if (msgOrKey && typeof msgOrKey === 'object') {
                    key = msgOrKey.key || null;
                    ts = msgOrKey.ts || null;
                } else if (typeof msgOrKey === 'string') {
                    key = msgOrKey;
                }

                if (useFirebase && key) {
                    logDebug('[guest-messages] removing key from Firebase', key);
                    firebaseRef.child(key).remove().then(function() {
                        logDebug('[guest-messages] firebase remove succeeded for', key);
                    }).catch(function (e) {
                        console.warn('Failed to remove message from Firebase', e);
                        logDebug('[guest-messages] firebase remove failed:', e && e.message ? e.message : e);
                    });
                    return;
                }

                if (ts) {
                    for (var i = 0; i < messages.length; i++) {
                        if (messages[i].ts === ts) {
                            messages.splice(i, 1);
                            break;
                        }
                    }
                }
                persist();
                var selector = key ? '[data-key="' + key + '"]' : '[data-ts="' + ts + '"]';
                var node = list.querySelector(selector);
                if (node) node.remove();
                logDebug('[guest-messages] deleted local message', selector);
            }

            form.addEventListener('submit', function (ev) {
                ev.preventDefault();
                var text = textarea.value.trim();
                if (!text) return;

                var msg = { text: text, ts: Date.now() };

                if (useFirebase && firebaseRef) {
                    try {
                        var newRef = firebaseRef.push();
                        logDebug('[guest-messages] pushing to Firebase', msg);
                        newRef.set(msg).then(function () {
                            logDebug('[guest-messages] firebase push success key=', newRef.key);
                        }).catch(function (e) {
                            console.warn('Failed to write message to Firebase, falling back to localStorage', e);
                            logDebug('[guest-messages] firebase push failed:', e && e.message ? e.message : e);
                            messages.push(msg);
                            appendMessage(msg);
                            persist();
                        });
                    } catch (e) {
                        console.error('[guest-messages] firebase push threw', e);
                        logDebug('[guest-messages] firebase push threw:', e && e.message ? e.message : e);
                        messages.push(msg);
                        appendMessage(msg);
                        persist();
                    }
                } else {
                    messages.push(msg);
                    appendMessage(msg);
                    persist();
                    logDebug('[guest-messages] appended local message', msg);
                }

                textarea.value = '';
                textarea.focus();
            });

            // Accessibility: allow Ctrl+Enter to submit
            textarea.addEventListener('keydown', function (ev) {
                if ((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter') {
                    ev.preventDefault();
                    form.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            });
        })();
    </script>
</body>
</html>
