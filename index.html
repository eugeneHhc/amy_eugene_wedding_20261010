<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Our Wedding Celebration</title>
    
    <style>
        /* Modern CSS Variables & Reset */
        :root {
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            --bg-color: #fcfbfa;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #8a7a6e;
            --accent-light: #e2dcd5;
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            --radius: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Native CSS Nesting (Modern Standard Layout) */
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: max(2rem, 4vw);

            header {
                text-align: center;
                margin-bottom: clamp(3rem, 8vw, 6rem);

                h1 {
                    font-size: clamp(2.5rem, 6vw, 4.5rem);
                    font-weight: 200;
                    letter-spacing: 4px;
                    color: var(--accent);
                    margin-bottom: 1.5rem;
                    text-transform: uppercase;
                }

                .meta-info {
                    font-size: clamp(1.1rem, 2vw, 1.3rem);
                    color: var(--text-muted);
                    font-weight: 300;
                    letter-spacing: 1px;
                    
                    b {
                        color: var(--text-main);
                        font-weight: 500;
                    }
                }
            }
        }

        /* Fluid Responsive Photo Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: clamp(3rem, 8vw, 6rem);

            .photo-frame {
                overflow: hidden;
                border-radius: var(--radius);
                box-shadow: var(--card-shadow);
                aspect-ratio: 4 / 5;

                img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);

                    &:hover {
                        transform: scale(1.04);
                    }
                }
            }
        }

        /* Clean RSVP / Guest Messages Wrapper Layout */
        .rsvp-container {
            background: #ffffff;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 1rem;
            border: 1px solid rgba(0,0,0,0.02);
            position: relative;
            text-align: center;
            padding: 28px;
            margin-bottom: clamp(2rem, 6vw, 3rem);
            
            iframe {
                width: 100%;
                border: none;
                border-radius: calc(var(--radius) - 4px);
                display: block;
            }

            h2 {
                margin-bottom: 8px;
                font-size: 1.6rem;
                color: var(--accent);
                font-weight: 300;
            }

            p.lead {
                margin-bottom: 16px;
                color: var(--text-muted);
            }
        }

        /* Native Dialog Password Gate with Glassmorphism Backdrop */
        dialog#gateway {
            border: none;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: rgba(252, 251, 250, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;

            .gate-card {
                background: #ffffff;
                padding: 3rem 2.5rem;
                border-radius: var(--radius);
                box-shadow: 0 30px 60px rgba(0,0,0,0.1);
                text-align: center;
                max-width: 420px;
                width: 90%;

                h2 {
                    font-weight: 300;
                    letter-spacing: 2px;
                    margin-bottom: 1rem;
                    color: var(--accent);
                }

                p {
                    font-size: 0.95rem;
                    color: var(--text-muted);
                    margin-bottom: 2rem;
                }

                input[type="password"] {
                    width: 100%;
                    padding: 14px;
                    border: 1px solid var(--accent-light);
                    border-radius: 8px;
                    font-size: 1rem;
                    text-align: center;
                    outline: none;
                    transition: border-color 0.3s;
                    margin-bottom: 1rem;

                    &:focus {
                        border-color: var(--accent);
                    }
                }

                button {
                    width: 100%;
                    padding: 14px;
                    background: var(--accent);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    font-size: 1rem;
                    font-weight: 500;
                    cursor: pointer;
                    letter-spacing: 1px;
                    transition: opacity 0.3s;

                    &:hover {
                        opacity: 0.9;
                    }
                }

                .error-txt {
                    color: #e53e3e;
                    font-size: 0.85rem;
                    margin-top: 1rem;
                    min-height: 20px;
                }
            }
        }

        /* Prevent background layout interactions when gate is locked */
        body:has(dialog[open]) .wrapper {
            pointer-events: none;
            filter: blur(4px);
        }
    </style>
</head>
<body>
    <main class="wrapper">
        <header>
            <h1>Amy & Eugene</h1>
            <p class="meta-info">
                <b>Saturday, October 10, 2026</b><br>
                Ceremony begins at 1:00 PM &bull; Reception to follow<br>
                Hong Kong Disneyland Hotel
            </p>
        </header>

        <section class="gallery-grid">
            <div class="photo-frame">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800&q=85" alt="Pre-wedding Moment 1" loading="lazy">
            </div>
            <div class="photo-frame">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=85" alt="Pre-wedding Moment 2" loading="lazy">
            </div>
            <div class="photo-frame">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=800&q=85" alt="Pre-wedding Moment 3" loading="lazy">
            </div>
        </section>

        <section id="guest-messages" class="rsvp-container">
            <h2>Leave a congratulations message</h2>
            <p class="lead">Share a short message for the newlyweds — your kind words will be treasured.</p>

            <!--
              NOTE: This iframe currently points to the site's existing Google Form embed.
              If you have a dedicated "congratulations" Google Form, replace the src URL below
              with the embed link from the form's Send → Embed option.
            -->
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSf0yROc5FfPcvex7G3e1uPGXo3nmQMk99EKZypuarafcVtwhw/viewform?embedded=true" 
                height="700" 
                loading="lazy" 
                title="Guest congratulations form">
                Loading Guest Messages Form...
            </iframe>
        </section>
    </main>
</body>
</html>
