<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Our Wedding Celebration</title>
    
    <style>
        /* Modern CSS Variables & Reset */
        :root {
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            --bg-color: #fcfbfa;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #8a7a6e;
            --accent-light: #e2dcd5;
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            --radius: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Native CSS Nesting (Modern Standard Layout) */
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: max(2rem, 4vw);

            header {
                text-align: center;
                margin-bottom: clamp(3rem, 8vw, 6rem);

                h1 {
                    font-size: clamp(2.5rem, 6vw, 4.5rem);
                    font-weight: 200;
                    letter-spacing: 4px;
                    color: var(--accent);
                    margin-bottom: 1.5rem;
                    text-transform: uppercase;
                }

                .meta-info {
                    font-size: clamp(1.1rem, 2vw, 1.3rem);
                    color: var(--text-muted);
                    font-weight: 300;
                    letter-spacing: 1px;
                    
                    b {
                        color: var(--text-main);
                        font-weight: 500;
                    }
                }
            }
        }

        /* Fluid Responsive Photo Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: clamp(3rem, 8vw, 6rem);

            .photo-frame {
                overflow: hidden;
                border-radius: var(--radius);
                box-shadow: var(--card-shadow);
                aspect-ratio: 4 / 5;

                img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);

                    &:hover {
                        transform: scale(1.04);
                    }
                }
            }
        }

        /* Clean RSVP / Guest Messages Wrapper Layout */
        .rsvp-container {
            background: #ffffff;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 1rem;
            border: 1px solid rgba(0,0,0,0.02);
            position: relative;
            text-align: center;
            padding: 28px;
            margin-bottom: clamp(2rem, 6vw, 3rem);
            
            iframe {
                width: 100%;
                border: none;
                border-radius: calc(var(--radius) - 4px);
                display: block;
            }

            h2 {
                margin-bottom: 8px;
                font-size: 1.6rem;
                color: var(--accent);
                font-weight: 300;
            }

            p.lead {
                margin-bottom: 16px;
                color: var(--text-muted);
            }
        }

        /* Guest messages UI */
        .guest-form {
            /* Make the textarea occupy the full section width and place the button below it */
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            align-items: start;
            margin-top: 12px;
        }

        textarea#gmsg {
            width: 100%;
            /* Increase the visible area but keep it bounded by viewport to avoid overflowing the section */
            min-height: 220px;
            max-height: min(60vh, 420px);
            resize: vertical;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--accent-light);
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
        }

        button#send {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            justify-self: start; /* keep the button aligned to the left of the form */
        }

        .messages {
            margin-top: 20px;
            text-align: left;
            display: grid;
            gap: 12px;
        }

        .message {
            background: linear-gradient(180deg, #fff 0%, #fbfaf9 100%);
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
            font-size: 0.98rem;
            color: var(--text-main);
            position: relative;
        }

        .message time {
            display: block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Delete button for admin */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: 1px solid rgba(0,0,0,0.06);
            color: var(--accent);
            padding: 6px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .delete-btn:hover {
            background: rgba(138,122,110,0.06);
        }

        /* Native Dialog Password Gate with Glassmorphism Backdrop */
        dialog#gateway {
            border: none;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: rgba(252, 251, 250, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;

            .gate-card {
                background: #ffffff;
                padding: 3rem 2.5rem;
                border-radius: var(--radius);
                box-shadow: 0 30px 60px rgba(0,0,0,0.1);
                text-align: center;
                max-width: 420px;
                width: 90%;

                h2 {
                    font-weight: 300;
                    letter-spacing: 2px;
                    margin-bottom: 1rem;
                    color: var(--accent);
                }

                p {
                    font-size: 0.95rem;
                    color: var(--text-muted);
                    margin-bottom: 2rem;
                }

                input[type="password"] {
                    width: 100%;
                    padding: 14px;
                    border: 1px solid var(--accent-light);
                    border-radius: 8px;
                    font-size: 1rem;
                    text-align: center;
                    outline: none;
                    transition: border-color 0.3s;
                    margin-bottom: 1rem;

                    &:focus {
                        border-color: var(--accent);
                    }
                }

                button {
                    width: 100%;
                    padding: 14px;
                    background: var(--accent);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    font-size: 1rem;
                    font-weight: 500;
                    cursor: pointer;
                    letter-spacing: 1px;
                    transition: opacity 0.3s;

                    &:hover {
                        opacity: 0.9;
                    }
                }

                .error-txt {
                    color: #e53e3e;
                    font-size: 0.85rem;
                    margin-top: 1rem;
                    min-height: 20px;
                }
            }
        }

        /* Prevent background layout interactions when gate is locked */
        body:has(dialog[open]) .wrapper {
            pointer-events: none;
            filter: blur(4px);
        }
    </style>
</head>
<body>
    <main class="wrapper">
        <header>
            <h1>Amy & Eugene</h1>
            <p class="meta-info">
                <b>Saturday, October 10, 2026</b><br>
                Ceremony begins at 1:00 PM &bull; Reception to follow<br>
                Hong Kong Disneyland Hotel
            </p>
        </header>

        <section class="gallery-grid">
            <div class="photo-frame">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800&q=85" alt="Pre-wedding Moment 1" loading="lazy">
            </div>
            <div class="photo-frame">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=85" alt="Pre-wedding Moment 2" loading="lazy">
            </div>
            <div class="photo-frame">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=800&q=85" alt="Pre-wedding Moment 3" loading="lazy">
            </div>
        </section>

        <section id="guest-messages" class="rsvp-container">
            <h2>Leave your congratulations</h2>
            <p class="lead">Share a short message for the newlyweds — your kind words will be treasured.</p>

            <!-- Replaced Google Form embed with a lightweight, local guest message textarea. -->
            <form id="guestForm" class="guest-form" action="#" method="post" novalidate>
                <textarea id="gmsg" name="message" placeholder="Write your message here..." maxlength="1000" required aria-label="Message for newlyweds"></textarea>
                <div>
                    <button id="send" type="submit">Send</button>
                </div>
            </form>

            <div class="messages" id="messages" aria-live="polite" aria-atomic="true"></div>
        </section>
    </main>

    <script>
        // Lightweight in-memory + localStorage messages.
        // Performance goals: minimal DOM updates, simple append-only rendering, no external libraries.
        (function () {
            var form = document.getElementById('guestForm');
            var textarea = document.getElementById('gmsg');
            var list = document.getElementById('messages');
            var STORAGE_KEY = 'guest_messages_v1';

            // Determine admin mode: visible delete buttons only when URL contains ?admin=1 or ?admin=true
            var isAdmin = (function () {
                try {
                    var params = new URLSearchParams(window.location.search);
                    var v = params.get('admin');
                    if (v === '1' || v === 'true') return true;
                    return false;
                } catch (e) {
                    return false;
                }
            })();

            // Load existing messages from localStorage (fast, synchronous, small payloads)
            var messages = [];
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (raw) messages = JSON.parse(raw);
            } catch (e) {
                // If parsing fails, clear storage entry to avoid repeated errors.
                console.warn('Failed to read guest messages from localStorage', e);
                try { localStorage.removeItem(STORAGE_KEY); } catch (ignored) {}
                messages = [];
            }

            // Helper: create message DOM node and append
            function appendMessage(msg) {
                var wrapper = document.createElement('div');
                wrapper.className = 'message';
                wrapper.setAttribute('data-ts', msg.ts);

                var text = document.createElement('div');
                text.textContent = msg.text;
                wrapper.appendChild(text);

                var time = document.createElement('time');
                time.textContent = new Date(msg.ts).toLocaleString();
                wrapper.appendChild(time);

                // If admin, add delete button
                if (isAdmin) {
                    var del = document.createElement('button');
                    del.className = 'delete-btn';
                    del.textContent = 'Delete';
                    del.setAttribute('aria-label', 'Delete message');
                    del.addEventListener('click', function () {
                        if (!confirm('Delete this message? This action cannot be undone.')) return;
                        deleteMessage(msg.ts);
                    });
                    wrapper.appendChild(del);
                }

                // Append at end. Using appendChild is fast and avoids reflow of entire list.
                list.appendChild(wrapper);
            }

            // Render initial messages (append only)
            (function renderInitial() {
                if (!messages || !messages.length) return;
                // Create a document fragment to minimize reflows
                var frag = document.createDocumentFragment();
                for (var i = 0; i < messages.length; i++) {
                    var msg = messages[i];
                    var wrapper = document.createElement('div');
                    wrapper.className = 'message';
                    wrapper.setAttribute('data-ts', msg.ts);

                    var text = document.createElement('div');
                    text.textContent = msg.text;
                    wrapper.appendChild(text);

                    var time = document.createElement('time');
                    time.textContent = new Date(msg.ts).toLocaleString();
                    wrapper.appendChild(time);

                    if (isAdmin) {
                        var del = document.createElement('button');
                        del.className = 'delete-btn';
                        del.textContent = 'Delete';
                        del.setAttribute('aria-label', 'Delete message');
                        (function(ts){ del.addEventListener('click', function () {
                            if (!confirm('Delete this message? This action cannot be undone.')) return;
                            deleteMessage(ts);
                        }); })(msg.ts);
                        wrapper.appendChild(del);
                    }

                    frag.appendChild(wrapper);
                }
                list.appendChild(frag);
            })();

            // Persist messages to localStorage (debounced to avoid excessive writes)
            var saveTimer = null;
            function persist() {
                if (saveTimer) return; // simple throttle: at most once per event loop tick
                saveTimer = setTimeout(function () {
                    saveTimer = null;
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
                    } catch (e) {
                        // Storage quota exceeded? silently fail; messages remain in-memory for this session.
                        console.warn('Failed to persist guest messages', e);
                    }
                }, 0);
            }

            function deleteMessage(ts) {
                // Remove from in-memory array
                for (var i = 0; i < messages.length; i++) {
                    if (messages[i].ts === ts) {
                        messages.splice(i, 1);
                        break;
                    }
                }
                // Persist changes
                persist();
                // Remove DOM element
                var node = list.querySelector('[data-ts="' + ts + '"]');
                if (node) node.remove();
            }

            form.addEventListener('submit', function (ev) {
                ev.preventDefault();
                var text = textarea.value.trim();
                if (!text) return;

                // Create message object
                var msg = { text: text, ts: Date.now() };

                // Append to in-memory array
                messages.push(msg);

                // Append to DOM immediately (fast path)
                appendMessage(msg);

                // Persist asynchronously
                persist();

                // Clear textarea and restore focus for quick multiple messages
                textarea.value = '';
                textarea.focus();
            });

            // Accessibility: allow Ctrl+Enter to submit
            textarea.addEventListener('keydown', function (ev) {
                if ((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter') {
                    ev.preventDefault();
                    form.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            });
        })();
    </script>
</body>
</html>
